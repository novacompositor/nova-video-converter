name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CMAKE_VERSION: "3.30.0"
  QT_VERSION: "6.8.2"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Linux Build & Package (Primary release target)
  # ─────────────────────────────────────────────────────────────────────────────
  linux_build:
    name: Linux Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libavdevice-dev libpostproc-dev \
            libclang-dev clang pkg-config \
            qt6-base-dev qt6-declarative-dev \
            cmake ninja-build \
            libgl1-mesa-dev libvulkan-dev \
            libqt6quickcontrols2-6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: "cargo-cache-v1"

      - name: Build Rust (release)
        run: cargo build --workspace --release

      - name: Configure CMake
        run: |
          cmake -B ui_qt/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -S ui_qt/

      - name: Build Qt UI
        run: cmake --build ui_qt/build --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: NovaCompositor-linux-x86_64
          path: ui_qt/build/bin/NovaCompositor
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: linux_build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: NovaCompositor-*
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate changelog
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # Nova Compositor Release

          ## Changes
          EOF
          git log --oneline -10 >> RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md << 'EOF'

          ## Installation

          ### Linux
          1. Download `NovaCompositor-linux-x86_64`
          2. Extract and run: `./NovaCompositor`

          **Requirements**: Qt6, FFmpeg libraries must be installed.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.run_number }}
          name: Nova Compositor v0.1.0-${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/NovaCompositor-linux-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
