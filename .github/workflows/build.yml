name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Linux Build & Package (Primary release target)
  # ─────────────────────────────────────────────────────────────────────────────
  linux_build:
    name: Linux Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libavdevice-dev libpostproc-dev \
            libclang-dev clang pkg-config \
            qt6-base-dev qt6-declarative-dev \
            cmake ninja-build \
            libgl1-mesa-dev libvulkan-dev \
            desktop-file-utils libfuse2 appstream \
            libqt6quickcontrols2-6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Build Rust (release)
        run: cargo build --workspace --release

      - name: Configure CMake
        run: |
          cmake -B ui_qt/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -S ui_qt/

      - name: Build Qt UI
        run: cmake --build ui_qt/build --parallel

      - name: Create DEB package
        run: |
          cd ui_qt/build
          ../../linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e bin/NovaCompositor \
            -i ../resources/nova-compositor.png \
            -d ../resources/nova-compositor.desktop \
            -p qt \
            --output deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: NovaCompositor-linux-x86_64.deb
          path: ui_qt/build/*.deb
          retention-days: 30

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: NovaCompositor-linux-binary
          path: ui_qt/build/bin/NovaCompositor
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: linux_build
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: NovaCompositor-*
          merge-multiple: true
          path: artifacts/

      - name: Generate changelog
        run: |
          echo "# Nova Compositor Release" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Changes" >> RELEASE_NOTES.md
          git log --oneline -10 >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Linux" >> RELEASE_NOTES.md
          echo "- **DEB**: Install with \`sudo apt install ./nova-compositor_*.deb\`" >> RELEASE_NOTES.md
          echo "- **Binary**: Extract and run \`./NovaCompositor\`" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.run_number }}
          name: Nova Compositor v0.1.0-${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
