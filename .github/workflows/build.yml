name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Rust Lint & Test
  # ─────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Linux: install FFmpeg dev libs
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libclang-dev clang

      # macOS: install FFmpeg via homebrew
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      # Windows: install FFmpeg via chocolatey
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg-full -y

      - name: Cargo fmt check
        run: cargo fmt --workspace -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo test (workspace, no FFmpeg feature for speed)
        run: cargo test --workspace --no-default-features

      - name: Cargo test (with FFmpeg feature)
        if: runner.os == 'Linux'
        run: cargo test --workspace

      - name: Cargo build release
        run: cargo build --workspace --release --no-default-features

  # ─────────────────────────────────────────────────────────────────────────────
  # Qt UI build (Linux only for CI speed — add macOS/Windows later)
  # ─────────────────────────────────────────────────────────────────────────────
  qt_build:
    name: Qt UI Build (Linux)
    runs-on: ubuntu-22.04
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            qt6-base-dev qt6-declarative-dev \
            cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B ui_qt/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -S ui_qt/

      - name: Build Qt UI
        run: cmake --build ui_qt/build --parallel

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-compositor-linux-x86_64
          path: ui_qt/build/NovaCompositor
