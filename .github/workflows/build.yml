name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Rust Build (all platforms)
  # ─────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Linux: install FFmpeg dev libs
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libavdevice-dev libpostproc-dev \
            libclang-dev clang pkg-config

      # macOS: install FFmpeg via homebrew
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config

      # Windows: install FFmpeg via vcpkg
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg integrate install
          vcpkg install ffmpeg[avdevice,avfilter,avformat,swresample,swscale,avcodec]:x64-windows

      - name: Cargo build release (workspace)
        run: cargo build --workspace --release
        env:
          PKG_CONFIG_ALLOW_SYSTEM_LIBS: "1"
          PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: "1"

      - name: Upload Rust artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux
          path: target/release/
          retention-days: 1

      - name: Upload Rust artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos
          path: target/release/
          retention-days: 1

      - name: Upload Rust artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows
          path: target/release/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Qt UI build & Package (Linux, macOS, Windows)
  # ─────────────────────────────────────────────────────────────────────────────
  qt_build:
    name: Qt UI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]

    steps:
      - uses: actions/checkout@v4

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Download Rust artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v4
        with:
          name: rust-linux
          path: target/release/

      - name: Install Qt6 and build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            qt6-base-dev qt6-declarative-dev qt6-quickcontrols2-dev \
            cmake ninja-build \
            libgl1-mesa-dev libvulkan-dev

      - name: Build Rust app_bridge (Linux)
        if: runner.os == 'Linux'
        run: cargo build --manifest-path app_bridge/Cargo.toml --release

      - name: Download linuxdeploy (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B ui_qt/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -S ui_qt/

      - name: Build Qt UI (Linux)
        if: runner.os == 'Linux'
        run: cmake --build ui_qt/build --parallel

      - name: Create AppDir (Linux)
        if: runner.os == 'Linux'
        run: |
          cd ui_qt/build
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/512x512/apps AppDir/usr/share/applications
          cp bin/NovaCompositor AppDir/usr/bin/
          cp ../resources/nova-compositor.png AppDir/usr/share/icons/hicolor/512x512/apps/
          cp ../resources/nova-compositor.desktop AppDir/usr/share/applications/
          cp ../resources/nova-compositor.desktop AppDir/
          cp ../resources/nova-compositor.png AppDir/nova-compositor.png
          
          # Copy Qt libs
          cp /usr/lib/x86_64-linux-gnu/libQt6*.so* AppDir/usr/lib/ 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/qt6/plugins/platforms/*.so AppDir/usr/lib/qt6/plugins/platforms/ 2>/dev/null || true
          mkdir -p AppDir/usr/lib/qt6/plugins/platforms
          cp /usr/lib/x86_64-linux-gnu/qt6/plugins/platforms/libqxcb.so AppDir/usr/lib/qt6/plugins/platforms/ 2>/dev/null || true

      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          cd ui_qt/build
          chmod +x ../../linuxdeploy-x86_64.AppImage
          export QML_SOURCES_PATHS=../qml
          ../../linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable=AppDir/usr/bin/NovaCompositor \
            --qml-dir=../qml \
            --plugin=qt \
            --output=appimage \
            --desktop-file=AppDir/nova-compositor.desktop \
            --icon-file=AppDir/nova-compositor.png || {
              echo "linuxdeploy failed, creating manual AppImage..."
              # Manual AppImage creation
              wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
              chmod +x appimagetool-x86_64.AppImage
              mkdir -p AppDir/usr/share/applications
              cp ../resources/nova-compositor.desktop AppDir/usr/share/applications/
              ./appimagetool-x86_64.AppImage AppDir NovaCompositor.AppImage
            }

      - name: Create DEB package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd ui_qt/build
          ../../linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable=AppDir/usr/bin/NovaCompositor \
            --qml-dir=../qml \
            --plugin=qt \
            --output=deb \
            --desktop-file=AppDir/nova-compositor.desktop \
            --icon-file=AppDir/nova-compositor.png || echo "DEB creation failed, continuing..."

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: nova-compositor-linux-x86_64
          path: |
            ui_qt/build/*.AppImage
            ui_qt/build/*.deb
            ui_qt/build/bin/NovaCompositor
          retention-days: 30

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Download Rust artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@v4
        with:
          name: rust-macos
          path: target/release/

      - name: Install Qt6 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 cmake ninja
          echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH

      - name: Build Rust app_bridge (macOS)
        if: runner.os == 'macOS'
        run: cargo build --manifest-path app_bridge/Cargo.toml --release

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B ui_qt/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -S ui_qt/

      - name: Build Qt UI (macOS)
        if: runner.os == 'macOS'
        run: cmake --build ui_qt/build --parallel

      - name: Create macOS App Bundle
        if: runner.os == 'macOS'
        run: |
          cd ui_qt/build
          mkdir -p NovaCompositor.app/Contents/MacOS
          mkdir -p NovaCompositor.app/Contents/Resources
          mkdir -p NovaCompositor.app/Contents/Frameworks
          cp bin/NovaCompositor NovaCompositor.app/Contents/MacOS/
          
          # Copy Qt frameworks
          for lib in Qt6Core Qt6Gui Qt6Qml Qt6Quick Qt6Widgets; do
            cp "$(brew --prefix qt@6)/lib/${lib}.framework/${lib}" NovaCompositor.app/Contents/Frameworks/ 2>/dev/null || true
          done
          
          cat > NovaCompositor.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>NovaCompositor</string>
            <key>CFBundleIdentifier</key><string>com.novacompositor.app</string>
            <key>CFBundleName</key><string>Nova Compositor</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
          </dict>
          </plist>
          EOF
          
          # Create DMG
          hdiutil create -volname "Nova Compositor" -srcfolder NovaCompositor.app -ov -format UDZO NovaCompositor-macos.dmg

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nova-compositor-macos-arm64
          path: ui_qt/build/*.dmg
          retention-days: 30

      # ── Windows ──────────────────────────────────────────────────────────────
      - name: Download Rust artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: rust-windows
          path: target/release/

      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install qt6-base qt6-declarative qt6-quickcontrols2 cmake ninja -y

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Rust app_bridge (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --manifest-path app_bridge/Cargo.toml --release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B ui_qt\build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -S ui_qt\

      - name: Build Qt UI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build ui_qt\build --config Release --parallel

      - name: Deploy Qt dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $qtBin = Get-ChildItem -Path "C:\Qt" -Recurse -Filter "qmake.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($qtBin) {
            & "$qtBin\windeployqt.exe" --release ui_qt\build\bin\NovaCompositor.exe
          }

      - name: Create Windows installer (NSIS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          
          $nsisScript = @"
          !include "MUI2.nsh"
          !define PRODUCT_NAME "Nova Compositor"
          !define PRODUCT_VERSION "0.1.0"
          !define PRODUCT_PUBLISHER "NovaCompositor"
          
          Name "`${PRODUCT_NAME}"
          OutFile "NovaCompositor-Setup.exe"
          InstallDir "`$PROGRAMFILES\NovaCompositor"
          
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_LICENSE "..\..\LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          
          !insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "ui_qt\build\bin\*.*"
            File /r "ui_qt\build\bin\*"
            WriteRegStr HKLM SOFTWARE\`${PRODUCT_NAME} "" `$INSTDIR
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            CreateDirectory "`$SMPROGRAMS\`${PRODUCT_NAME}"
            CreateShortCut "`$SMPROGRAMS\`${PRODUCT_NAME}\Nova Compositor.lnk" "`$INSTDIR\NovaCompositor.exe"
            CreateShortCut "`$DESKTOP\`${PRODUCT_NAME}.lnk" "`$INSTDIR\NovaCompositor.exe"
          SectionEnd
          
          Section "Uninstall"
            DeleteRegKey HKLM SOFTWARE\`${PRODUCT_NAME}
            Delete "`$INSTDIR\uninstall.exe"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\`${PRODUCT_NAME}"
            Delete "`$DESKTOP\`${PRODUCT_NAME}.lnk"
          SectionEnd
          "@
          
          Set-Content -Path "ui_qt\build\installer.nsi" -Value $nsisScript
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V2 "ui_qt\build\installer.nsi"
          Move-Item "NovaCompositor-Setup.exe" "ui_qt\build\" -Force

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: nova-compositor-windows-x64
          path: |
            ui_qt/build/NovaCompositor-Setup.exe
            ui_qt/build/bin/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: qt_build
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nova-compositor-*
          merge-multiple: false
          path: artifacts/

      - name: Generate changelog
        run: |
          echo "# Nova Compositor Release" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Changes" >> RELEASE_NOTES.md
          git log --oneline -10 >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Linux" >> RELEASE_NOTES.md
          echo "- **AppImage**: \`NovaCompositor-*.AppImage\` - portable version" >> RELEASE_NOTES.md
          echo "- **DEB**: \`nova-compositor_*.deb\` - for Debian/Ubuntu" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### macOS" >> RELEASE_NOTES.md
          echo "- **DMG**: \`NovaCompositor-*.dmg\` - drag to Applications" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Windows" >> RELEASE_NOTES.md
          echo "- **Installer**: \`NovaCompositor-Setup.exe\` - run to install" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.run_number }}
          name: Nova Compositor v0.1.0-${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
